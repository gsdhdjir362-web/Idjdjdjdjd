name: SSH Giant - 10 Runners

on:
  workflow_dispatch:

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install sshpass
        run: sudo apt update && sudo apt install -y sshpass
      - name: Run Giant
        run: python ssh_giant.py
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: giant-results
          path: |
            success.txt
            alive_ips.txt
            usernames.txt
            passwords.txt
