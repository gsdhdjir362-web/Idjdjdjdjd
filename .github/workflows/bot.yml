name: Minecraft Bot Local Map
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install System Dependencies for Canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm install

      - name: Install Cloudflare CLI
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Tunnel and Bot
        run: |
          # اجرای تونل در پس‌زمینه و فیلتر کردن لاگ‌ها برای پیدا کردن لینک
          cloudflared tunnel --url http://localhost:3000 2>&1 | grep --line-buffered -o "https://.*trycloudflare.com" > tunnel_link.txt &
          
          # اجرای سرور و ربات ماینکرافت
          node bot.js &
          
          # استراحت کوتاه برای فیکس شدن لینک
          sleep 5
          
          echo "=================================================="
          echo "🌐 آدرس موقت مانیتورینگ شما آماده است 👇"
          cat tunnel_link.txt
          echo "=================================================="
          
          # زنده نگه داشتن پروسه برای مانیتور کردن
          wait
