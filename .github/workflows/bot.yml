name: Minecraft Bot Local Server
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install System Dependencies for Canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm install

      - name: Install Cloudflare CLI
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Download & Configure Minecraft Server
        run: |
          echo "⬇️ در حال دانلود سرور رسمی ماینکرافت..."
          wget -q https://launcher.mojang.com/v1/objects/1b553e2631a927c3437eeb313413b0881c940611/server.jar -O server.jar
          
          echo "⚙️ در حال پذیرفتن قوانین EULA و تنظیم آفلاین مود..."
          echo "eula=true" > eula.txt
          echo "online-mode=false" > server.properties
          echo "difficulty=easy" >> server.properties
          echo "spawn-monsters=true" >> server.properties

      - name: Run Server, Tunnel, and Bot
        run: |
          echo "☕ در حال روشن کردن سرور ماینکرافت در پس‌زمینه..."
          java -Xmx1024M -Xms1024M -jar server.jar nogui > /dev/null 2>&1 &
          
          echo "⚡ در حال راه‌اندازی تونل موقت کلودفلر..."
          cloudflared tunnel --url http://localhost:3000 2>&1 | grep --line-buffered -o "https://.*trycloudflare.com" > tunnel_link.txt &
          
          echo "⏳ ۱۵ ثانیه صبر برای آماده‌سازی کامل سرور و تونل..."
          sleep 15
          
          echo "🤖 استارت زدن بات ماینکرافت..."
          node bot.js &
          
          echo "=================================================="
          echo "🌐 آدرس موقت مانیتورینگ شما آماده است 👇"
          cat tunnel_link.txt
          echo "=================================================="
          
          # نگه داشتن جاب برای ادامه کار بات و مانیتورینگ
          wait
